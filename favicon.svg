<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fondo con gradiente azul -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="buildingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo redondeado -->
  <rect width="64" height="64" rx="12" fill="url(#bgGradient)"/>
  
  <!-- Edificio principal -->
  <rect x="12" y="20" width="40" height="36" rx="2" fill="url(#buildingGradient)"/>
  
  <!-- Ventanas del edificio -->
  <rect x="18" y="28" width="6" height="6" rx="1" fill="#3b82f6" opacity="0.7"/>
  <rect x="28" y="28" width="6" height="6" rx="1" fill="#3b82f6" opacity="0.7"/>
  <rect x="38" y="28" width="6" height="6" rx="1" fill="#3b82f6" opacity="0.7"/>
  <rect x="48" y="28" width="6" height="6" rx="1" fill="#3b82f6" opacity="0.7"/>
  
  <rect x="18" y="38" width="6" height="6" rx="1" fill="#3b82f6" opacity="0.7"/>
  <rect x="28" y="38" width="6" height="6" rx="1" fill="#3b82f6" opacity="0.7"/>
  <rect x="38" y="38" width="6" height="6" rx="1" fill="#3b82f6" opacity="0.7"/>
  <rect x="48" y="38" width="6" height="6" rx="1" fill="#3b82f6" opacity="0.7"/>
  
  <rect x="18" y="48" width="6" height="6" rx="1" fill="#3b82f6" opacity="0.7"/>
  <rect x="28" y="48" width="6" height="6" rx="1" fill="#3b82f6" opacity="0.7"/>
  <rect x="38" y="48" width="6" height="6" rx="1" fill="#3b82f6" opacity="0.7"/>
  <rect x="48" y="48" width="6" height="6" rx="1" fill="#3b82f6" opacity="0.7"/>
  
  <!-- Puerta principal -->
  <rect x="26" y="44" width="12" height="12" rx="1" fill="#1d4ed8"/>
  <circle cx="34" cy="50" r="1.5" fill="#ffffff"/>
  
  <!-- Tarjeta de acceso (icono de visita) -->
  <rect x="44" y="8" width="12" height="8" rx="1.5" fill="#ffffff"/>
  <rect x="46" y="10" width="8" height="4" rx="0.5" fill="#3b82f6"/>
  <circle cx="50" cy="12" r="0.8" fill="#ffffff"/>
</svg>

